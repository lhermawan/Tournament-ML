version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-Diskominfo2026#}@db:3306/${MYSQL_DATABASE:-ml_dleague}
      NODE_ENV: production
    ports:
      - "${APP_PORT:-4000}:3000"

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Diskominfo2026#}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ml_dleague}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/ml_dleague.sql:/docker-entrypoint-initdb.d/01-ml_dleague.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-Diskominfo2026#}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:

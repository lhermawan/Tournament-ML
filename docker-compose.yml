version: '3.9'

services:
  app:
    image: node:20-alpine
    container_name: tournament_app
    working_dir: /app
    depends_on:
      - db
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-Diskominfo2026#}@db:3306/${MYSQL_DATABASE:-ml_dleague}
      NODE_ENV: development
    ports:
      - "${APP_PORT:-4000}:3000"
    volumes:
      - ./:/app
      - /app/node_modules
    command: sh -c "npm install && npx prisma generate && npm run dev"

  db:
    image: mysql:8.0
    container_name: tournament_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Diskominfo2026#}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ml_dleague}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/ml_dleague.sql:/docker-entrypoint-initdb.d/ml_dleague.sql:ro
    command: --default-authentication-plugin=mysql_native_password

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: tournament_phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
      UPLOAD_LIMIT: 128M
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"

volumes:
  mysql_data:

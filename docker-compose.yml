version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: tournament_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Diskominfo2026
      MYSQL_DATABASE: ml_dleague
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/ml_dleague.sql:/docker-entrypoint-initdb.d/ml_dleague.sql:ro
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    image: node:20-alpine
    container_name: tournament_app
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://root:Diskominfo2026@db:3306/ml_dleague
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - /app/node_modules
    command: >
      sh -c "npm install &&
             npx prisma generate &&
             npm run dev"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: tournament_phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
      UPLOAD_LIMIT: 128M
    ports:
      - "8080:80"

volumes:
  mysql_data: